name: Tourism MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Step 1: Data Ingestion
      - name: Data Ingestion (Register Dataset)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/data_ingestion.py

      # Step 2: Data Preparation
      - name: Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/data_preparation.py

      # Step 3: Model Training
      - name: Model Training & Registration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/train_model.py

      # Step 4: Hosting (Optional: If triggering deployment script)
       - name: Deploy to Space
         env:
           HF_TOKEN: ${{ secrets.HF_TOKEN }}
         run: python src/hosting_script.py
